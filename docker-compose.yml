version: '3.9'

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: uz24_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-uz24staffflow}
      POSTGRES_USER:     ${POSTGRES_USER:-uz24user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uz24pass_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-uz24user}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Next.js App ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uz24_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:     postgresql://${POSTGRES_USER:-uz24user}:${POSTGRES_PASSWORD:-uz24pass_change_me}@db:5432/${POSTGRES_DB:-uz24staffflow}
      NEXTAUTH_URL:     ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET:  ${NEXTAUTH_SECRET}
      NODE_ENV:         production
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/docs > /dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
